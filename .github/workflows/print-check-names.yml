name: Print Check Names (One-shot)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to inspect (default: staging)"
        required: false
        default: "staging"

permissions:
  contents: read
  actions: read

jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - name: List workflows (names + paths)
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          echo "## Workflows in $OWNER/$REPO" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows?per_page=100" \
            | jq -r '.workflows[] | "- \(.name)  —  \(.path)"' \
            | tee workflows.txt

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Raw list" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat workflows.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Find latest run on ref and print job check names
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          REF: ${{ github.event.inputs.ref }}
        run: |
          set -euo pipefail

          # Récupère la dernière run (tous workflows confondus) sur la ref
          run_id="$(curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?branch=${REF}&per_page=1" \
            | jq -r '.workflow_runs[0].id // empty')"

          if [ -z "${run_id:-}" ]; then
            echo "::warning::No workflow runs found on ref=${REF}. Trigger any workflow on this branch, then rerun this."
            echo "### Check names" >> "$GITHUB_STEP_SUMMARY"
            echo "_No runs found on ref=${REF}. Trigger a workflow then rerun._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "[info] latest run_id=$run_id on ref=$REF"

          # Liste les jobs de cette run
          curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs?per_page=100" \
