name: DB Integrity (billing)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: db-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm from packageManager)
        run: |
          set -euo pipefail
          corepack enable
          # utilise la version déclarée dans package.json ("packageManager": "pnpm@9.15.9")
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: DB migrate + billing integrity
        run: pnpm run ci:db
