name: DB Integrity (billing)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: db-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-integrity:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exodus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d exodus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exodus?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/exodus?schema=public

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm from packageManager)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: DB migrate + billing integrity
        run: pnpm run ci:db
